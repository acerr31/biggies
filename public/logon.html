<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/logon.css">
</head>

<body>

    <!-- Logo -->
    <div class="logo">
        <img src="images/PlatedLogo.png" alt="Company Logo">
    </div>

    <!-- Main Split Screen -->
    <div class="main-wrapper">

        <!-- Left Side (Login Area) -->
        <div class="left-side">
            <div class="container">
                <h1>Welcome to Plated!</h1>

                <div class="tab">
                    <button class="tab-button active" id="login-tab">Login</button>
                    <button class="tab-button" id="create-account-tab">Create Account</button>
                </div>

                <div id="form-container">
                    <!-- Logon Form -->
            <form id="logon-form" class="active-form">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>

                <label for="login-password">Password:</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>

                <button type="submit" class="button">Login</button>
            </form>

                    <!-- Create Account Form -->
            <form id="create-account-form">
                <label for="create-email">Email:</label>
                <input type="email" id="create-email" placeholder="Enter your email" required>
                
                <label for="create-username">Username:</label>
                <input type="text" id="create-username" placeholder="Create a username" required>

                <label for="create-first-name">First Name:</label>
                <input type="text" id="create-first-name" placeholder="Enter your first name" required>

                <label for="create-last-name">Last Name:</label>
                <input type="text" id="create-last-name" placeholder="Enter your last name" required>

                <label for="create-phone-number">Phone Number:</label>
                <input type="text" id="create-phone-number" placeholder="Enter your phone number" required>

                <label for="create-password">Password:</label>
                <input type="password" id="create-password" placeholder="Create your password" required>

                <button type="submit" class="button">Create Account</button>
            </form>

                    <p id="message" class="message"></p>
                </div>
            </div>
        </div>

        <!-- Right Side (Image Area) -->
        <div class="right-side">
            <img src="images/logonimage.jpg" alt="Login Illustration">
        </div>

    </div>

    <script src="js/logon.js"></script>
</body>

</html>
