<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Plated</title>
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Top Nav -->
  <header class="topbar">
  <div class="logo">
    <a href="home.html">
      <img src="images/PlatedLogo.png" alt="Plated" />
    </a>
  </div>
  <nav class="topbar-links">
    <a href="home.html" class="nav-link">Feed</a>
    <a href="explore.html" class="nav-link">Explore</a>
    <a href="restaurantform.html" class="nav-link">Submit a Restaurant</a>
    <a href="profile.html" class="nav-link active">Profile</a>
  </nav>
  <div class="topbar-right">
    <div class="topbar-avatar" id="topbar-initials">?</div>
    <span class="topbar-username" id="profile-username">—</span>
  </div>
</header>

  <!-- Page body -->
  <main class="page">

    <!-- ROW 1: identity | right panel (stats + rank + recs) -->
    <div class="grid-row row-top">

      <!-- Identity card -->
      <div class="card identity-card">
        <div class="avatar-circle" id="avatar-initials" title="Click to change photo">
          <img id="avatar-photo" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;" />
          <input type="file" id="avatar-upload" accept="image/*" style="display:none;" />
        </div>
        <div class="identity-info">
          <h2 class="identity-name" id="display-name">—</h2>
          <p class="identity-handle">@<span id="handle-username">—</span></p>
          <p class="identity-since">Member since 2026</p>
        </div>
        <div class="school-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          Arizona State University '26
        </div>
        <div class="mini-stats">
          <div class="mini-stat">
            <span class="mini-stat-num">0</span>
            <span class="mini-stat-lab">Followers</span>
          </div>
          <div class="mini-stat-divider"></div>
          <div class="mini-stat">
            <span class="mini-stat-num">0</span>
            <span class="mini-stat-lab">Following</span>
          </div>
        </div>
        <div class="identity-btns">
          <button class="btn-primary" id="edit-profile-btn">Edit Profile</button>
          <button class="btn-primary" id="share-profile-btn">Share</button>
          <button class="btn-primary" id="logout-btn">Log Out</button>
        </div>
      </div>

      <!-- Overview card: stats + rank + recs combined -->
      <div class="card overview-card">

        <!-- Top stat strip -->
        <div class="overview-stats">
          <div class="overview-stat">
            <span class="overview-stat-num" id="visited-count">0</span>
            <span class="overview-stat-lab">Visited</span>
          </div>
          <div class="overview-stat-divider"></div>
          <div class="overview-stat">
            <span class="overview-stat-num" id="streak-count">0 wks</span>
            <span class="overview-stat-lab">Streak</span>
          </div>
          <div class="overview-stat-divider"></div>
          <div class="overview-stat rank-toggle" id="rank-toggle">
            <span class="overview-stat-num" id="rank-num">#—</span>
            <span class="overview-stat-lab">Rank <span class="rank-chevron">›</span></span>
          </div>
        </div>

        <!-- Leaderboard dropdown -->
        <div class="leaderboard-dropdown" id="leaderboard-dropdown"></div>

        <div class="overview-divider"></div>

        <!-- Recs -->
        <p class="card-eyebrow">Recs for you</p>
        <div class="recs-list" id="recs-list">
          <p class="recs-loading">Loading...</p>
        </div>

      </div>

    </div>

    <!-- ROW 2: lists | account details -->
    <div class="grid-row row-bottom">

      <!-- Lists card -->
      <div class="card lists-card">
        <p class="card-eyebrow">My lists</p>
        <div class="list-rows">
          <div class="list-row been-toggle" id="been-toggle">
            <div class="list-left">
              <div class="list-icon">✓</div>
              <span class="list-name">Been</span>
            </div>
            <span class="list-meta" id="been-list-count">0 <span class="been-chevron">›</span></span>
          </div>
          <div class="been-dropdown" id="been-dropdown">
            <!-- restaurant rows injected by JS -->
          </div>
        </div>
      </div>

      <!-- Account details card -->
      <div class="card details-card">
        <p class="card-eyebrow">Account details</p>
        <div class="detail-rows">
          <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value" id="profile-email">—</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Phone</span>
            <span class="detail-value" id="profile-phone">—</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">First name</span>
            <span class="detail-value" id="profile-first-name">—</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Last name</span>
            <span class="detail-value" id="profile-last-name">—</span>
          </div>
        </div>
      </div>

    </div>

    <!-- ROW 3: Posts grid (Instagram-style) -->
    <div class="grid-row row-posts" id="posts-section" style="display:none;">
      <div class="card posts-card">
        <div class="posts-header">
          <p class="card-eyebrow" style="margin-bottom:0;">My Posts</p>
          <span class="posts-count-label" id="posts-count-label"></span>
        </div>
        <div class="posts-feed" id="posts-grid">
          <!-- post cards injected by JS -->
        </div>
      </div>
    </div>

  </main>

  <p id="message" class="message"></p>

  <!-- Review detail modal -->
  <div class="review-modal-backdrop" id="review-modal-backdrop">
    <div class="review-modal" id="review-modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-photo-strip" id="modal-photo-strip"></div>
      <div class="modal-body">
        <h3 class="modal-restaurant" id="modal-restaurant"></h3>
        <div class="modal-meta-row">
          <span class="modal-sentiment" id="modal-sentiment"></span>
          <span class="modal-stars" id="modal-stars"></span>
        </div>
        <p class="modal-date" id="modal-date"></p>
        <p class="modal-notes" id="modal-notes"></p>
        <p class="modal-dishes" id="modal-dishes"></p>
        <a class="modal-link" id="modal-link" href="#">View restaurant page ›</a>
      </div>
    </div>
  </div>

  <script src="/js/profile.js"></script>
</body>
</html>
