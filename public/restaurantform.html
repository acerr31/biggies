<!doctype html>

<head>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Submit a Restaurant</title>
  <link rel="stylesheet" href="css/restaurantform.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>
<body>

  <!-- Start of Topbar Layout -->
  <header class="topbar">
  <div class="logo">
    <a href="dashboard.html">
      <img src="images/PlatedLogo.png" alt="Plated" />
    </a>
  </div>

  <nav class="topbar-links">
    <a href="home.html" class="nav-link">Feed</a>
    <a href="explore.html" class="nav-link">Explore</a>
    <a href="restaurantform.html" class="nav-link active">Submit A Restaurant</a>
    <a href="profile.html" class="nav-link">Profile</a>

    <a href="profile.html" class="topbar-username" id="topbarUsername">-</a> <!-- Grabs Username -->

<!-- Start of Page layout -->

  <main class="page">
    <section class="sheet">
      <h1>Submit a Restaurant</h1>
      <p class="lead">Enter the restaurant details below. Fields marked with * are required.</p>

      <form id="restaurantForm" novalidate>
        <div class="row">
          <div class="col">
            <label for="name">Name *</label>
            <input id="name" name="name" type="text" required placeholder="Sunset Grill" />
            <div id="err-name" class="error" aria-live="polite"></div>
          </div>

          <div class="col">
            <label for="phone">Phone *</label>
            <input id="phone" name="phone" type="tel" required placeholder="(555) 555-5555" />
            <div id="err-phone" class="error" aria-live="polite"></div>
          </div>
        </div>

        <div class="col">
          <label for="address">Address *</label>
          <input id="address" name="address" type="text" required placeholder="123 Main St, City, ST 12345" />
          <div id="err-address" class="error" aria-live="polite"></div>
        </div>

        <div class="col">
          <label for="website">Website</label>
          <input id="website" name="website" type="url" placeholder="https://www.example.com" />
          <div id="err-website" class="error" aria-live="polite"></div>
        </div>

        <div class="col">
          <label>Tags * <span class="small">(type a tag, then press comma)</span></label>
          <div class="tags-input" id="tagsInput" role="list">
            <input id="tagEntry" type="text" placeholder="Italian, Vegan, Burgers, etc." aria-label="Add tag" />
          </div>
          <div id="err-tags" class="error" aria-live="polite"></div>
        </div>

        <fieldset>
          <legend>About *</legend>

          <div class="col">
            <label for="description">Description *</label>
            <textarea id="description" name="description" required placeholder="Short summary of the restaurant"></textarea>
            <div id="err-description" class="error" aria-live="polite"></div>
          </div>

          <div class="col">
            <label for="amenities">Amenities</label>
            <input id="amenities" name="amenities" type="text" placeholder="Outdoor seating, Wi-Fi, Wheelchair accessible" />
          </div>

          <div class="col">
            <label for="bestTime">Best time to visit</label>
            <input id="bestTime" name="bestTime" type="text" placeholder="Weeknights, brunch, happy hour" />
          </div>

          <div class="col">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Parking, reservations, specials, etc."></textarea>
          </div>

          <div class="HourCol">
          <label>Hours</label>


          <div class="hours-grid">

            <div class="day-row">
              <span>Mon</span>
              <input type="time" id="mondayOpen">
              <input type="time" id="mondayClose">
            </div>

            <div class="day-row">
              <span>Tue</span>
              <input type="time" id="tuesdayOpen">
              <input type="time" id="tuesdayClose">
            </div>

            <div class="day-row">
              <span>Wed</span>
              <input type="time" id="wednesdayOpen">
              <input type="time" id="wednesdayClose">
            </div>

            <div class="day-row">
              <span>Thu</span>
              <input type="time" id="thursdayOpen">
              <input type="time" id="thursdayClose">
            </div>

            <div class="day-row">
              <span>Fri</span>
              <input type="time" id="fridayOpen">
              <input type="time" id="fridayClose">
            </div>

            <div class="day-row">
              <span>Sat</span>
              <input type="time" id="saturdayOpen">
              <input type="time" id="saturdayClose">
            </div>

            <div class="day-row">
              <span>Sun</span>
              <input type="time" id="sundayOpen">
              <input type="time" id="sundayClose">
            </div>

          </div>
        </div>
</div>
        </fieldset>

        <div id="submitResult" class="small" aria-live="polite"></div>

        <div class="actions">
          <button type="submit" class="submit">Submit Restaurant</button>
          <button type="button" class="reset" id="resetBtn">Reset</button>
        </div>
      </form>
    </section>
  </main>

  <!-- Script to Gather User's Details -->

  <script>
  document.addEventListener("DOMContentLoaded", async () => {
  const topbarUsername = document.getElementById("topbarUsername");
  const topbarAvatar = document.getElementById("topbarAvatar");

  const token = localStorage.getItem("jwtToken");

  if (!token) {
    topbarUsername.textContent = "Guest";
    topbarAvatar.textContent = "G";
    return;
  }

  try {
    const response = await fetch("/api/profile", {
      method: "GET",
      headers: {
        "Authorization": token,
        "Content-Type": "application/json"
      }
    });

    const data = await response.json();

    if (!response.ok) {
      topbarUsername.textContent = "Guest";
      topbarAvatar.textContent = "G";
      return;
    }

    const username = data.username || "Guest";
    topbarUsername.textContent = username;

    // Use first + last name for initials
    const firstName = data.first_name || "";
    const lastName = data.last_name || "";

    let initials = "G";

    if (firstName || lastName) {
      initials =
        (firstName[0] || "") +
        (lastName[0] || "");
    } else {
      // fallback to username if names don't exist
      initials = username.slice(0, 2);
    }

    topbarAvatar.textContent = initials.toUpperCase();

  } catch (error) {
    console.error("Error loading topbar user:", error);
    topbarUsername.textContent = "Guest";
    topbarAvatar.textContent = "G";
  }
});
</script>

<!-- Script for Handling Tags -->
  <script src="/js/restaurantForm.js"></script> <!-- This connection to the JS file must be here for the backend connection to work 
  (we can reduce code if needed in the future for optimization)-->
  <script>
    // Tags UI, commit only when a comma is typed
    (function () {
      const tags = [];
      const tagsInput = document.getElementById('tagsInput');
      const tagEntry = document.getElementById('tagEntry');
      const errTags = document.getElementById('err-tags');

      function renderTags() {
        document.querySelectorAll('#tagsInput .tag').forEach(tag => tag.remove());

        tags.forEach((tagText, index) => {
          const chip = document.createElement('span');
          chip.className = 'tag';
          chip.setAttribute('role', 'listitem');

          const text = document.createElement('span');
          text.textContent = tagText;

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.setAttribute('aria-label', `Remove tag ${tagText}`);
          removeBtn.textContent = '×';
          removeBtn.addEventListener('click', () => {
            tags.splice(index, 1);
            renderTags();
          });

          chip.appendChild(text);
          chip.appendChild(removeBtn);
          tagsInput.insertBefore(chip, tagEntry);
        });
      }

      function commitTag() {
        const value = tagEntry.value.trim().replace(/,$/, '');
        if (!value) return;

        value
          .split(',')
          .map(t => t.trim())
          .filter(Boolean)
          .forEach(tag => {
            if (!tags.includes(tag)) tags.push(tag);
          });

        tagEntry.value = '';
        renderTags();
        errTags.textContent = '';
      }

      tagEntry.addEventListener('keydown', (e) => {
        if (e.key === ',') {
          e.preventDefault();
          commitTag();
        }

        if (e.key === 'Backspace' && tagEntry.value === '' && tags.length > 0) {
          tags.pop();
          renderTags();
        }
      });

      tagEntry.addEventListener('paste', (e) => {
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        if (pasted.includes(',')) {
          e.preventDefault();
          pasted
            .split(',')
            .map(t => t.trim())
            .filter(Boolean)
            .forEach(tag => {
              if (!tags.includes(tag)) tags.push(tag);
            });
          tagEntry.value = '';
          renderTags();
          errTags.textContent = '';
        }
      });

      window.__restaurantTags = tags;
    })();
  </script>

<!-- Restaurant Submission + Validation -->

  <script>
    // Submit + validation
    (function () {
      const form = document.getElementById('restaurantForm');

      const isValidPhone = (s) => {
        const digits = s.replace(/\D/g, '');
        return digits.length >= 7 && digits.length <= 15;
      };

      const isValidUrl = (s) => {
        if (!s) return true;
        try {
          const url = new URL(s);
          return url.protocol === 'http:' || url.protocol === 'https:';
        } catch {
          return false;
        }
      };

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        document.querySelectorAll('.error').forEach(n => n.textContent = '');
        document.getElementById('submitResult').textContent = '';

        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const website = document.getElementById('website').value.trim();
        const description = document.getElementById('description').value.trim();
        const amenities = document.getElementById('amenities').value.trim();
        const bestTime = document.getElementById('bestTime').value.trim();
        const notes = document.getElementById('notes').value.trim();
        const hours = document.getElementById('hours').value.trim();
        const tags = window.__restaurantTags || [];

        let ok = true;

        if (!name) {
          document.getElementById('err-name').textContent = 'Name is required.';
          ok = false;
        }
        if (!address) {
          document.getElementById('err-address').textContent = 'Address is required.';
          ok = false;
        }
        if (!phone || !isValidPhone(phone)) {
          document.getElementById('err-phone').textContent = 'Please enter a valid phone number.';
          ok = false;
        }
        if (website && !isValidUrl(website)) {
          document.getElementById('err-website').textContent = 'Please enter a valid URL starting with http:// or https://';
          ok = false;
        }
        if (!description) {
          document.getElementById('err-description').textContent = 'Description is required.';
          ok = false;
        }
        if (tags.length < 1) {
          document.getElementById('err-tags').textContent = 'Please add at least one tag.';
          ok = false;
        }

        if (!ok) {
          document.getElementById('submitResult').textContent = 'Please fix the errors above and resubmit.';
          return;
        }

        const restaurant = {
          name,
          address,
          phone,
          website: website || null,
          tags,
          about: {
            description,
            amenities: amenities ? amenities.split(',').map(s => s.trim()).filter(Boolean) : [],
            bestTime: bestTime || null,
            notes: notes || null,
            hours: hours || null
          },
          submittedAt: new Date().toISOString()
        };

        console.log('Restaurant submission:', restaurant);

        try {
          const key = 'submittedRestaurants_v1';
          const existing = JSON.parse(localStorage.getItem(key) || '[]');
          existing.unshift(restaurant);
          localStorage.setItem(key, JSON.stringify(existing));
        } catch (err) {
          console.warn('Could not save to localStorage', err);
        }

        document.getElementById('submitResult').textContent = 'Thanks, restaurant submitted locally.';

        form.reset();
        window.__restaurantTags.length = 0;
        document.querySelectorAll('#tagsInput .tag').forEach(t => t.remove());
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        form.reset();
        window.__restaurantTags.length = 0;
        document.querySelectorAll('#tagsInput .tag').forEach(t => t.remove());
        document.querySelectorAll('.error').forEach(n => n.textContent = '');
        document.getElementById('submitResult').textContent = '';
      });
    })();

  </script>
</body>
