<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Submit a Restaurant</title>

  <!-- Minimal styles to make the form readable; remove / replace as desired -->
  <style>
    :root{
      --maxw: 820px;
      --accent: #d4872a;
      --muted: #6b6b6b;
      --radius: 10px;
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: #fafafa;
      margin: 24px;
      display: flex;
      justify-content: center;
    }
    .sheet {
      width: 100%;
      max-width: var(--maxw);
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }
    h1 { margin: 0 0 10px 0; font-size: 20px; }
    p.lead { margin: 0 0 18px 0; color: var(--muted); }

    form { display: grid; gap: 12px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .col { display:flex; flex-direction:column; gap:6px; }
    label { font-weight:600; font-size: .95rem; }
    input[type="text"], input[type="tel"], input[type="url"], textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      width:100%;
    }
    textarea { min-height: 100px; resize: vertical; }

    .small { font-size: 13px; color: var(--muted); }
    .error { color: #c0392b; font-size: 13px; }

    .actions { display:flex; gap:12px; margin-top:8px; }
    button.submit {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight:700;
      cursor:pointer;
    }
    button.reset {
      background: #fff;
      border: 1px solid #ddd;
      padding: 10px 14px;
      border-radius: 8px;
      cursor:pointer;
    }

    /* tags UI */
    .tags-input {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      padding:8px;
      border:1px solid #ddd;
      border-radius:8px;
    }
    .tags-input input {
      border: none; outline: none; min-width:120px;
    }
    .tag {
      background:#f0f0f0; padding:6px 8px; border-radius:999px; font-size:13px; display:flex; gap:8px; align-items:center;
    }
    .tag button { background:transparent; border:none; cursor:pointer; font-weight:700; color:#7a7a7a; }

    @media (max-width:720px) {
      .row { grid-template-columns: 1fr; }
      .top-note { padding: 8px 0; }
    }
  </style>
</head>
<body>

  <div class="sheet" role="main">
    <h1>Submit a Restaurant</h1>
    <p class="lead">Enter the required information. Fields marked with * are required.</p>

    <form id="restaurantForm" novalidate>
      <!-- Basic info -->
      <div class="row">
        <div class="col">
          <label for="name">Name *</label>
          <input id="name" name="name" type="text" required placeholder="Sunset Grill" />
          <div id="err-name" class="error" aria-live="polite"></div>
        </div>

        <div class="col">
          <label for="phone">Phone *</label>
          <input id="phone" name="phone" type="tel" placeholder="(555) 555-5555" required />
          <div id="err-phone" class="error" aria-live="polite"></div>
        </div>
      </div>

      <div class="col">
        <label for="address">Address *</label>
        <input id="address" name="address" type="text" required placeholder="123 Main St, City, ST 12345" />
        <div id="err-address" class="error" aria-live="polite"></div>
      </div>

      <div class="col">
        <label for="website">Website</label>
        <input id="website" name="website" type="url" placeholder="https://www.example.com" />
        <div id="err-website" class="error" aria-live="polite"></div>
      </div>

      <!-- Tags (min 1) -->
      <div class="col">
        <label>Tags * <span class="small">(at least one, e.g., "Italian", "Vegan")</span></label>
        <div class="tags-input" id="tagsInput" role="list">
          <input id="tagEntry" placeholder="Type tag and press Enter" aria-label="Add tag" />
        </div>
        <div id="err-tags" class="error" aria-live="polite"></div>
      </div>

      <!-- About section -->
      <fieldset style="border:none; padding:0; margin-top:6px;">
        <legend style="font-weight:700; margin-bottom:6px;">About *</legend>

        <label for="description">Description (short) *</label>
        <textarea id="description" name="description" required placeholder="Short summary of the restaurant"></textarea>
        <div id="err-description" class="error" aria-live="polite"></div>

        <label for="amenities">Amenities (comma-separated)</label>
        <input id="amenities" name="amenities" type="text" placeholder="Outdoor seating, Wi-Fi, Wheelchair accessible" />
        
        <label for="bestTime">Best time to visit</label>
        <input id="bestTime" name="bestTime" type="text" placeholder="Weeknights, Weekend brunch, Happy hour 4–6pm" />

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" placeholder="Any extra notes (parking, reservations, specials)"></textarea>

        <label for="hours">Hours (text is fine)</label>
        <textarea id="hours" name="hours" placeholder="Mon–Thu: 8am–9pm; Fri–Sat: 8am–11pm; Sun: 9am–7pm"></textarea>
      </fieldset>

      <!-- Hidden-ish helper area to show result -->
      <div id="submitResult" class="small" aria-live="polite" style="margin-top:8px;"></div>

      <div class="actions">
        <button type="submit" class="submit">Submit Restaurant</button>
        <button type="button" class="reset" id="resetBtn">Reset</button>
      </div>
    </form>
  </div>

  <script>
    // Simple tags UI
    (function(){
      const tags = [];
      const tagsInput = document.getElementById('tagsInput');
      const tagEntry = document.getElementById('tagEntry');
      const errTags = document.getElementById('err-tags');

      function renderTags() {
        // remove all chips except the input
        [...tagsInput.querySelectorAll('.tag')].forEach(t => t.remove());
        tags.forEach((t, idx) => {
          const chip = document.createElement('span');
          chip.className = 'tag';
          chip.setAttribute('role','listitem');
          chip.textContent = t;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.setAttribute('aria-label','Remove tag ' + t);
          btn.textContent = '×';
          btn.addEventListener('click', () => {
            tags.splice(idx,1);
            renderTags();
          });
          chip.appendChild(btn);
          tagsInput.insertBefore(chip, tagEntry);
        });
      }

      tagEntry.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          const v = tagEntry.value.trim();
          if (!v) return;
          // split commas if user enters multiple
          v.split(',').map(s => s.trim()).filter(Boolean).forEach(sub => {
            if (!tags.includes(sub)) tags.push(sub);
          });
          tagEntry.value = '';
          renderTags();
          errTags.textContent = '';
        } else if (e.key === 'Backspace' && tagEntry.value === '') {
          // remove last tag
          tags.pop();
          renderTags();
        }
      });

      // expose tags for validation + submission
      window.__restaurantTags = tags;
    })();

    // Simple client-side validation & submit handler
    (function(){
      const form = document.getElementById('restaurantForm');

      // helper validators
      const isValidPhone = (s) => {
        if (!s) return false;
        // loose phone check: digits, spaces, parentheses, +, -
        const digits = s.replace(/\D/g,'');
        return digits.length >= 7 && digits.length <= 15;
      };
      const isValidUrl = (s) => {
        if (!s) return false;
        try { 
          const url = new URL(s);
          return url.protocol === 'http:' || url.protocol === 'https:';
        } catch(e) { return false; }
      };

      form.addEventListener('submit', function(e){
        e.preventDefault();

        // clear errors
        document.querySelectorAll('.error').forEach(n => n.textContent = '');
        document.getElementById('submitResult').textContent = '';

        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const website = document.getElementById('website').value.trim();
        const description = document.getElementById('description').value.trim();
        const amenities = document.getElementById('amenities').value.trim();
        const bestTime = document.getElementById('bestTime').value.trim();
        const notes = document.getElementById('notes').value.trim();
        const hours = document.getElementById('hours').value.trim();
        const tags = window.__restaurantTags || [];

        let ok = true;

        if (!name) {
          document.getElementById('err-name').textContent = 'Name is required.';
          ok = false;
        }
        if (!address) {
          document.getElementById('err-address').textContent = 'Address is required.';
          ok = false;
        }
        if (!phone || !isValidPhone(phone)) {
          document.getElementById('err-phone').textContent = 'Please enter a valid phone number.';
          ok = false;
        }
        if (website && !isValidUrl(website)) {
          document.getElementById('err-website').textContent = 'Please enter a valid URL starting with http:// or https://';
          ok = false;
        }
        if (!description) {
          document.getElementById('err-description').textContent = 'A short description is required.';
          ok = false;
        }
        if (!tags || tags.length < 1) {
          document.getElementById('err-tags').textContent = 'Please add at least one tag.';
          ok = false;
        }

        if (!ok) {
          document.getElementById('submitResult').textContent = 'Please fix the errors above and resubmit.';
          return;
        }

        // Build restaurant object
        const restaurant = {
          name,
          address,
          phone,
          website: website || null,
          tags,
          about: {
            description,
            amenities: amenities ? amenities.split(',').map(s => s.trim()).filter(Boolean) : [],
            bestTime: bestTime || null,
            notes: notes || null,
            hours: hours || null
          },
          submittedAt: new Date().toISOString()
        };

        // For now: print & store locally. Replace with fetch() to your API if you have one.
        console.log('Restaurant submission:', restaurant);

        // store in localStorage list for quick debugging
        try {
          const key = 'submittedRestaurants_v1';
          const existing = JSON.parse(localStorage.getItem(key) || '[]');
          existing.unshift(restaurant);
          localStorage.setItem(key, JSON.stringify(existing));
        } catch(err) {
          console.warn('Could not save to localStorage', err);
        }

        // Success message
        document.getElementById('submitResult').textContent = 'Thanks! Restaurant submitted locally. Check console or localStorage.';
        form.reset();
        // clear tags array + UI
        if (window.__restaurantTags) {
          window.__restaurantTags.length = 0;
          // re-render tags UI by simulating a quick tag input action:
          const ev = new KeyboardEvent('keydown', { key: 'Enter' });
          const tagInput = document.getElementById('tagEntry');
          if (tagInput) {
            tagInput.value = '';
            // remove chips by calling existing function - easiest is to reload render via site script
            // but since tags UI lives in an IIFE, we trigger a small helper:
            // simplest fallback: reload the page to clear UI (safe for now)
            // location.reload(); // uncomment if you want an automatic reload
            // Instead, remove existing chips:
            const chips = document.querySelectorAll('#tagsInput .tag');
            chips.forEach(c => c.remove());
          }
        }

        // If you have an endpoint to POST to, replace the console/localStorage block with:
        /*
        fetch('/api/restaurants', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(restaurant)
        })
        .then(r => r.json())
        .then(data => {
           // handle success
        })
        .catch(err => {
           // handle / show error
        });
        */
      });

      // Reset button clears tags UI and form
      document.getElementById('resetBtn').addEventListener('click', () => {
        form.reset();
        document.querySelectorAll('#tagsInput .tag').forEach(t => t.remove());
        if (window.__restaurantTags) window.__restaurantTags.length = 0;
        document.querySelectorAll('.error').forEach(n => n.textContent = '');
        document.getElementById('submitResult').textContent = '';
      });
    })();
  </script>
</body>
</html>
